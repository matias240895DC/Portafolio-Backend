<div class="login-container animate">
  <div class="glass login-card">
    <h1>Admin <span>Access</span></h1>
    <p>Ingrese sus credenciales para gestionar el portafolio</p>
    
    <form (submit)="onLogin($event)">
      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" name="email" placeholder="email@example.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="glow-btn" [disabled]="loading">
        {{ loading ? 'Ingresando...' : 'Entrar' }}
      </button>
      <div *ngIf="error" class="error-msg">{{ error }}</div>
    </form>
  </div>
</div>
