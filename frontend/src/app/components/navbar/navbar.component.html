<nav class="glass navbar animate">
  <div class="container nav-content">
    <div class="logo">
      <h2
        routerLink="/"
        (click)="closeMenu()"
        *ngIf="configService.config$ | async as config"
      >
        <img
          *ngIf="config.logoUrl"
          [src]="config.logoUrl"
          alt="Logo"
          class="nav-logo-img"
        />
        {{ config.logoText }}
      </h2>
    </div>

    <!-- Hamburger Toggle -->
    <button
      class="menu-toggle"
      (click)="toggleMenu()"
      [class.active]="isMenuOpen"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>

    <div class="nav-actions" [class.open]="isMenuOpen">
      <ul class="nav-links">
        <li>
          <a
            routerLink="/"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
            (click)="closeMenu()"
            >Home</a
          >
        </li>
        <li>
          <a
            routerLink="/projects"
            routerLinkActive="active"
            (click)="closeMenu()"
            >Proyectos</a
          >
        </li>
        <li>
          <a
            routerLink="/feedback"
            routerLinkActive="active"
            (click)="closeMenu()"
            >Feedback</a
          >
        </li>
        <li>
          <a
            routerLink="/contact"
            routerLinkActive="active"
            (click)="closeMenu()"
            >Contacto</a
          >
        </li>
        <li *ngIf="auth.currentUser$ | async as user">
          <a routerLink="/admin" routerLinkActive="active" (click)="closeMenu()"
            >Admin</a
          >
        </li>
      </ul>

      <!-- CV Download Button -->
      <button
        *ngIf="profile?.socialLinks?.cvUrl"
        class="cv-nav-btn"
        (click)="downloadCV(); closeMenu()"
        title="Descargar CV (PDF)"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
        Descargar CV
      </button>

      <div
        class="theme-actions"
        *ngIf="configService.config$ | async as config"
      >
        <label
          class="theme-switch"
          [title]="
            config.themeMode === 'light'
              ? 'Pasar a Modo Oscuro'
              : 'Pasar a Modo Claro'
          "
        >
          <input
            type="checkbox"
            [checked]="config.themeMode === 'dark'"
            (change)="configService.toggleMode()"
          />
          <span class="slider">
            <svg
              class="sun"
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <svg
              class="moon"
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
          </span>
        </label>
      </div>

      <div class="auth-actions">
        <button
          *ngIf="!(auth.currentUser$ | async)"
          class="glow-btn"
          routerLink="/login"
          (click)="closeMenu()"
        >
          Login
        </button>
        <button
          *ngIf="auth.currentUser$ | async"
          class="logout-btn"
          (click)="auth.logout(); closeMenu()"
        >
          Salir
        </button>
      </div>
    </div>
  </div>
</nav>
